non_claims:
  - RACE-DLinear is not the main contribution and should not be described as SOTA.
  - The capacity simulator is a reproducible deployment proxy, not a production autoscaling simulator.
  - Alibaba2018 supports machine-level resource telemetry claims, not service-level SLO claims.
  - Chronos-Bolt is a bounded zero-shot reference, not a complete foundation-model comparison.
  - Main winner tables exclude LastValue, Chronos-Bolt, and LTSF-bridge iTransformer from core learned-model ranking claims.
  - Stress realism audit uses public-trace proxies and does not claim to observe unreleased operator ingestion-delay distributions.
  - Public fault-injection slice evaluation is sanity evidence, not production incident validation; RCAEval RE1-OB remains caution evidence, while RE2-OB provides short-window public fault-injection evidence with pre-injection-only training and latency-target decision cost.
  - Imputation pipeline rows are preprocessing baselines and do not enter the core model winner table unless explicitly labeled as pipeline comparisons.
  - The learned mask-aware imputer is a bounded preprocessing probe, not a complete learned-imputation benchmark.

